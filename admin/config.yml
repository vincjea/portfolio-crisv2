backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

media_library:
  name: upload

collections:
  - label: "Settings"
    name: "settings"
    files:
      - label: "General Content"
        name: "home"
        file: "data.json"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "text"}
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "About Statement", name: "about_text", widget: "text"}
          - {label: "Accent Color", name: "accent_color", widget: "color"}
          - {label: "Background Color", name: "bg_color", widget: "color"}

  - label: "Projects"
    name: "projects"
    folder: "projects"
    create: true
    format: "json"
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
