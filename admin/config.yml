backend:
  name: git-gateway
  branch: main # Change to 'master' if your GitHub default branch is master

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - label: "Site Content"
    name: "content"
    files:
      - label: "Home Page Text"
        name: "home"
        file: "data.json"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "text"}
          - {label: "About Statement", name: "about_text", widget: "text"}
          - {label: "Since Date", name: "about_since", widget: "string"}
          - {label: "Equipment List", name: "about_equipment", widget: "string"}
          - {label: "Businesses/Clients", name: "about_businesses", widget: "string"}
          - {label: "Contact Email", name: "email", widget: "string"}
