        /* Tailwind v4 Configuration Directive */
        @theme {

        /* Project Color Token Palette */
        :root {
            --background: #f0ead6;
            --foreground: oklch(0.25 0.05 68.26 / 0.83);
            --primary: oklch(0.25 0.05 68.26 / 0.83);
            --animate-fade-up: fadeUp 0.8s cubic-bezier(0.16, 1, 0.32, 1) forwards;
            --animate-fade-in: fadeIn 1s ease-out forwards;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--background);
            color: var(--primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Enforce Gilroy layout rules over Tailwind baseline layers */
        h1, h2, h3, .font-display {
            font-family: var(--font-display) !important;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Core Animation Keyframes */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Scroll Interaction Layout Reveal Transitions */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.32, 1),

            will-change: transform, opacity;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
