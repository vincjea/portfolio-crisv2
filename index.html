    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style>
        /* Manually defining Gilroy to prevent @import from breaking the Tailwind v4 parser */
        @font-face {
            font-family: 'Gilroy';
            src: url('https://cdn.jsdelivr.net/gh/mahmoud-esmail/Gilroy-Font@master/fonts/Gilroy-Medium.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/mahmoud-esmail/Gilroy-Font@master/fonts/Gilroy-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Gilroy';
            src: url('https://cdn.jsdelivr.net/gh/mahmoud-esmail/Gilroy-Font@master/fonts/Gilroy-Bold.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/mahmoud-esmail/Gilroy-Font@master/fonts/Gilroy-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        /* Camera UI Custom Typography */
        @font-face {
            font-family: 'CameraPlainVariable';
            src: url('https://cdn.gpteng.co/mcp-widgets/v1/fonts/CameraPlainVariable.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        /* Project Color Token Palette & Base Configuration */
        :root {
            --background: #f0ead6;
            --accent: oklch(0.25 0.05 68.26 / 0.83);
            --animate-fade-up: fadeUp 0.8s cubic-bezier(0.16, 1, 0.32, 1) forwards;
            --animate-fade-in: fadeIn 1s ease-out forwards;
        }

        /* Tailwind v4 Configuration Directive */
        @theme {
            --font-display: 'Gilroy', sans-serif;
            --color-cream: var(--background);
            --color-accent: var(--accent);
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--background);
            color: var(--accent);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Enforce Gilroy layout rules over Tailwind baseline layers */
        h1, h2, h3, .font-display {
            font-family: var(--font-display) !important;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Core Animation Keyframes */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Scroll Interaction Layout Reveal Transitions */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.32, 1), 
                        transform 1.2s cubic-bezier(0.16, 1, 0.32, 1);
            will-change: transform, opacity;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Safe Dynamic Navigation Switching Flags */
        .nav-link {
            color: var(--accent);
            opacity: 0.6;
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            opacity: 1;
        }
        .nav-link[data-active="true"] {
            background-color: var(--accent) !important;
            color: #ffffff !important;
            opacity: 1;
        }

        /* Lovable Platform Brand Utility styles */
        #lovable-badge {
            --badge-bg: #1b1b1b;
            --badge-text: #c5c1b9;
            --badge-text-hover: #dcdad5;
            --badge-radius: 6px;
            --badge-padding: 8px;
            --badge-gap: 6px;
            --badge-shadow: 0 0 0 1px rgba(0,0,0,0.88), 0 1px 0 0 rgba(0,0,0,0.04), 0 2px 2px -1px rgba(0,0,0,0.08);
            --badge-transition-duration: 0.2s;
            --focus-color: #575ECF;
            --focus-offset: 2px;
            --focus-width: 2px;
            position: fixed;
            bottom: 12px;
            right: 12px;
            height: 24px;
            display: flex;
            align-items: center;
            z-index: 1000000;
            background-color: var(--badge-bg) !important;
            color: var(--badge-text) !important;
            border-radius: var(--badge-radius);
            box-shadow: var(--badge-shadow) !important;
            font-size: 12px;
            font-family: CameraPlainVariable, sans-serif;
            transform: translateZ(0);
            transition: opacity 0.24s ease;
        }
        #lovable-badge.closing {
            opacity: 0;
            pointer-events: none;
        }
        #lovable-badge-cta {
            display: flex;
            align-items: center;
            gap: var(--badge-gap);
            padding: 0 var(--badge-padding);
            height: 100%;
            color: inherit;
            text-decoration: none;
            white-space: nowrap;
            border-radius: var(--badge-radius) 0 0 var(--badge-radius);
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        #lovable-badge-cta:hover { background: rgba(255,255,255,0.04); color: var(--badge-text-hover); }
        #lovable-badge-divider { width: 1px; height: 24px; background-color: rgba(255,255,255,0.04); }
        #lovable-badge-close { width: 24px; height: 24px; cursor: pointer; background: none; border: none; display: flex; align-items: center; justify-content: center; }
        #lovable-badge-close svg path { fill: var(--badge-text); }
        #lovable-badge-close:hover svg path { fill: var(--badge-text-hover); }
    </style>
</head>
